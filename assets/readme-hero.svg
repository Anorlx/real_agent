<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="640" viewBox="0 0 1600 640" role="img" aria-labelledby="title desc">
  <title id="title">code_agent project hero</title>
  <desc id="desc">A GitHub README hero image for code_agent, showing a local terminal agent connected to a LangGraph loop, tools, memory, context management, and sub agents.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#db2777"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
      .title { font: 800 72px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 500 24px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .body { font: 600 20px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #334155; letter-spacing: 0; }
      .small { font: 600 17px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .mono { font: 650 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; letter-spacing: 0; }
      .tiny { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 18; filter: url(#shadow); }
      .terminal { fill: #111827; stroke: #334155; stroke-width: 1.4; rx: 18; filter: url(#shadow); }
      .termbar { fill: #1f2937; rx: 18; }
      .red { fill: #f87171; }
      .yellow { fill: #fbbf24; }
      .greenDot { fill: #34d399; }
      .termText { font: 650 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #d1fae5; letter-spacing: 0; }
      .termDim { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #94a3b8; letter-spacing: 0; }
      .blueFill { fill: #dbeafe; stroke: #2563eb; }
      .greenFill { fill: #dcfce7; stroke: #16a34a; }
      .pinkFill { fill: #fce7f3; stroke: #db2777; }
      .amberFill { fill: #fef3c7; stroke: #d97706; }
      .node { stroke-width: 2.2; rx: 16; filter: url(#shadow); }
      .lineBlue { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrowBlue); }
      .lineGreen { fill: none; stroke: #16a34a; stroke-width: 3; marker-end: url(#arrowGreen); }
      .linePink { fill: none; stroke: #db2777; stroke-width: 3; marker-end: url(#arrowPink); }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; rx: 18; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="640"/>
  <g opacity="0.72">
    <path class="grid" d="M0 96 H1600 M0 192 H1600 M0 288 H1600 M0 384 H1600 M0 480 H1600 M0 576 H1600"/>
    <path class="grid" d="M120 0 V640 M240 0 V640 M360 0 V640 M480 0 V640 M600 0 V640 M720 0 V640 M840 0 V640 M960 0 V640 M1080 0 V640 M1200 0 V640 M1320 0 V640 M1440 0 V640"/>
  </g>

  <rect x="64" y="62" width="720" height="516" class="card"/>
  <text x="108" y="150" class="title">code_agent</text>
  <text x="112" y="196" class="subtitle">从零搭出来的本地 Python Coding Agent</text>
  <text x="112" y="242" class="body">Terminal 对话、LangGraph 主循环、工具执行、长期记忆、</text>
  <text x="112" y="274" class="body">上下文压缩和子 Agent 协作都在一个仓库里逐步长出来。</text>

  <g transform="translate(112 328)">
    <rect width="150" height="42" class="chip"/>
    <text x="24" y="27" class="small">LangGraph</text>
    <rect x="166" width="126" height="42" class="chip"/>
    <text x="190" y="27" class="small">Memory</text>
    <rect x="308" width="108" height="42" class="chip"/>
    <text x="334" y="27" class="small">Tools</text>
    <rect x="432" width="130" height="42" class="chip"/>
    <text x="456" y="27" class="small">Context</text>
  </g>

  <rect x="112" y="418" width="600" height="108" class="terminal"/>
  <rect x="112" y="418" width="600" height="34" class="termbar"/>
  <circle cx="136" cy="435" r="6" class="red"/>
  <circle cx="158" cy="435" r="6" class="yellow"/>
  <circle cx="180" cy="435" r="6" class="greenDot"/>
  <text x="136" y="482" class="termText">code_agent&gt; 帮我检查这个项目</text>
  <text x="136" y="512" class="termDim">state / tool_call / tool_done / token / context</text>

  <rect x="884" y="92" width="250" height="88" class="node blueFill"/>
  <text x="934" y="129" class="body">Terminal UI</text>
  <text x="924" y="155" class="tiny">streaming events</text>

  <rect x="1222" y="92" width="250" height="88" class="node greenFill"/>
  <text x="1270" y="129" class="body">StateGraph</text>
  <text x="1264" y="155" class="tiny">preprocess → api_call</text>

  <rect x="1222" y="274" width="250" height="88" class="node pinkFill"/>
  <text x="1282" y="311" class="body">Sub Agents</text>
  <text x="1258" y="337" class="tiny">tool search / runner / review</text>

  <rect x="884" y="274" width="250" height="88" class="node amberFill"/>
  <text x="964" y="311" class="body">Tools</text>
  <text x="920" y="337" class="tiny">file / project / shell / memory</text>

  <rect x="1042" y="456" width="274" height="88" class="node blueFill"/>
  <text x="1110" y="493" class="body">Memory + Context</text>
  <text x="1090" y="519" class="tiny">retrieval / compact / session</text>

  <path class="lineBlue" d="M1134 136 H1222"/>
  <path class="lineGreen" d="M1347 180 V274"/>
  <path class="linePink" d="M1222 318 H1134"/>
  <path class="lineGreen" d="M1009 362 C1014 424 1074 452 1130 456"/>
  <path class="lineBlue" d="M1316 500 C1450 480 1488 164 1472 136"/>
  <text x="938" y="230" class="mono">local-first agent loop</text>
</svg>
