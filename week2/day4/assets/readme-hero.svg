<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-labelledby="title desc">
  <title id="title">code_agent README hero</title>
  <desc id="desc">A clean README hero for code_agent showing the project as a local terminal coding agent built from four layers: terminal interface, LangGraph runtime, sub agents and tools, and durable memory.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .grid { stroke: #e2e8f0; stroke-width: 1; }
      .title { font: 800 72px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 520 25px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .label { font: 750 24px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .small { font: 560 17px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .mono { font: 650 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #d1fae5; letter-spacing: 0; }
      .dim { font: 600 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #94a3b8; letter-spacing: 0; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 20; filter: url(#shadow); }
      .terminal { fill: #111827; stroke: #334155; stroke-width: 1.4; rx: 18; filter: url(#shadow); }
      .termbar { fill: #1f2937; rx: 18; }
      .red { fill: #fb7185; }
      .yellow { fill: #fbbf24; }
      .green { fill: #34d399; }
      .layer { stroke-width: 2; rx: 18; filter: url(#shadow); }
      .blue { fill: #dbeafe; stroke: #2563eb; }
      .emerald { fill: #dcfce7; stroke: #16a34a; }
      .rose { fill: #fce7f3; stroke: #db2777; }
      .amber { fill: #fef3c7; stroke: #d97706; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow); }
      .chip { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.3; rx: 18; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="620"/>
  <g opacity="0.7">
    <path class="grid" d="M0 96 H1600 M0 192 H1600 M0 288 H1600 M0 384 H1600 M0 480 H1600 M0 576 H1600"/>
    <path class="grid" d="M120 0 V620 M240 0 V620 M360 0 V620 M480 0 V620 M600 0 V620 M720 0 V620 M840 0 V620 M960 0 V620 M1080 0 V620 M1200 0 V620 M1320 0 V620 M1440 0 V620"/>
  </g>

  <rect x="64" y="58" width="740" height="504" class="panel"/>
  <text x="112" y="146" class="title">code_agent</text>
  <text x="116" y="194" class="subtitle">从零开始搭建的本地 Python Coding Agent</text>
  <text x="116" y="242" class="small">它不是一个单文件聊天脚本，而是一套逐步拆开的 Agent 实验工程：</text>
  <text x="116" y="272" class="small">主循环、工具系统、权限审查、上下文管理、会话历史和长期记忆都能单独观察。</text>

  <g transform="translate(116 322)">
    <rect width="126" height="42" class="chip"/>
    <text x="26" y="27" class="small">Terminal</text>
    <rect x="144" width="142" height="42" class="chip"/>
    <text x="168" y="27" class="small">LangGraph</text>
    <rect x="304" width="112" height="42" class="chip"/>
    <text x="332" y="27" class="small">Tools</text>
    <rect x="434" width="126" height="42" class="chip"/>
    <text x="462" y="27" class="small">Memory</text>
  </g>

  <rect x="116" y="410" width="616" height="100" class="terminal"/>
  <rect x="116" y="410" width="616" height="34" class="termbar"/>
  <circle cx="140" cy="427" r="6" class="red"/>
  <circle cx="162" cy="427" r="6" class="yellow"/>
  <circle cx="184" cy="427" r="6" class="green"/>
  <text x="142" y="474" class="mono">code_agent&gt; 读项目、选工具、执行、回填、继续判断</text>
  <text x="142" y="502" class="dim">state / tool_call / review / tool_done / token / context</text>

  <rect x="906" y="72" width="560" height="112" class="layer blue"/>
  <text x="950" y="117" class="label">1. Terminal interface</text>
  <text x="950" y="150" class="small">会话选择、流式输出、工具事件、帮助命令</text>

  <path class="arrow" d="M1186 184 V224"/>
  <rect x="906" y="224" width="560" height="112" class="layer emerald"/>
  <text x="950" y="269" class="label">2. LangGraph runtime</text>
  <text x="950" y="302" class="small">preprocess → api_call → tool_execution → result_backfill</text>

  <path class="arrow" d="M1186 336 V376"/>
  <rect x="906" y="376" width="560" height="112" class="layer amber"/>
  <text x="950" y="421" class="label">3. Sub agents and tools</text>
  <text x="950" y="454" class="small">tool_search、permission_review、tool_runner、registry</text>

  <path class="arrow" d="M1186 488 V528"/>
  <rect x="906" y="528" width="560" height="56" class="layer rose"/>
  <text x="950" y="563" class="label">4. Memory, sessions, context</text>
</svg>
