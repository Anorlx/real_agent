<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">code_agent clean architecture map</title>
  <desc id="desc">A clean architecture map for code_agent. The diagram separates the CLI lifecycle, LangGraph core loop, tool permission pipeline, and durable support systems to avoid crossing lines.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#16a34a"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 38px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 520 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .section { font: 760 21px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .label { font: 720 17px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .small { font: 520 13px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .tiny { font: 520 12px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; letter-spacing: 0; }
      .mono { font: 650 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; letter-spacing: 0; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 18; filter: url(#shadow); }
      .node { stroke-width: 2; rx: 14; filter: url(#shadow); }
      .blue { fill: #dbeafe; stroke: #2563eb; }
      .cyan { fill: #e0f2fe; stroke: #0284c7; }
      .green { fill: #dcfce7; stroke: #16a34a; }
      .amber { fill: #fef3c7; stroke: #d97706; }
      .rose { fill: #fce7f3; stroke: #db2777; }
      .gray { fill: #f1f5f9; stroke: #64748b; }
      .violet { fill: #ede9fe; stroke: #7c3aed; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 2.8; marker-end: url(#arrowBlue); }
      .arrowGreen { fill: none; stroke: #16a34a; stroke-width: 2.8; marker-end: url(#arrowGreen); }
      .lane { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1120"/>
  <text x="52" y="58" class="title">code_agent 当前架构图</text>
  <text x="54" y="86" class="subtitle">按真实调用边界拆成三层：CLI 生命周期、LangGraph 主循环、工具与记忆支撑层。图中只保留主路径，避免交叉连线。</text>

  <rect x="44" y="122" width="1512" height="214" class="panel"/>
  <text x="72" y="160" class="section">1. CLI 生命周期：一轮用户输入如何进入主图，又如何被保存</text>
  <rect x="82" y="194" width="180" height="74" class="node blue"/>
  <text x="112" y="224" class="label">python main.py</text>
  <text x="112" y="246" class="tiny">main.py</text>
  <rect x="318" y="194" width="206" height="74" class="node cyan"/>
  <text x="350" y="224" class="label">chat_loop</text>
  <text x="350" y="246" class="tiny">选择会话 / 读取输入</text>
  <rect x="580" y="194" width="216" height="74" class="node rose"/>
  <text x="612" y="224" class="label">memory_retrieval</text>
  <text x="612" y="246" class="tiny">按当前问题取相关记忆</text>
  <rect x="852" y="194" width="190" height="74" class="node green"/>
  <text x="894" y="224" class="label">run_agent</text>
  <text x="894" y="246" class="tiny">进入 LangGraph</text>
  <rect x="1098" y="194" width="176" height="74" class="node amber"/>
  <text x="1134" y="224" class="label">print events</text>
  <text x="1134" y="246" class="tiny">流式展示状态</text>
  <rect x="1330" y="194" width="176" height="74" class="node gray"/>
  <text x="1358" y="224" class="label">persist</text>
  <text x="1358" y="246" class="tiny">session + memory</text>
  <path class="arrow" d="M262 231 H318"/>
  <path class="arrow" d="M524 231 H580"/>
  <path class="arrow" d="M796 231 H852"/>
  <path class="arrow" d="M1042 231 H1098"/>
  <path class="arrow" d="M1274 231 H1330"/>

  <rect x="44" y="374" width="940" height="476" class="panel"/>
  <text x="72" y="412" class="section">2. LangGraph 主循环：主 Agent 只关心消息、工具调用和回填结果</text>
  <rect x="84" y="456" width="196" height="78" class="node gray"/>
  <text x="118" y="488" class="label">AgentGraphState</text>
  <text x="118" y="510" class="tiny">messages / tools / memory_context</text>

  <rect x="344" y="456" width="204" height="78" class="node blue"/>
  <text x="390" y="488" class="label">preprocess</text>
  <text x="390" y="510" class="tiny">manage_context + select_tools</text>

  <rect x="612" y="456" width="204" height="78" class="node green"/>
  <text x="674" y="488" class="label">api_call</text>
  <text x="652" y="510" class="tiny">DashScope streaming + tool_calls</text>

  <path class="arrow" d="M280 495 H344"/>
  <path class="arrow" d="M548 495 H612"/>

  <polygon points="714,594 816,656 714,718 612,656" class="node amber"/>
  <text x="664" y="652" class="label">有工具调用?</text>
  <text x="681" y="674" class="tiny">conditional edge</text>
  <path class="arrow" d="M714 534 V594"/>

  <rect x="344" y="618" width="204" height="76" class="node cyan"/>
  <text x="382" y="650" class="label">termination_check</text>
  <text x="382" y="672" class="tiny">无工具调用时结束本轮</text>

  <rect x="84" y="618" width="196" height="76" class="node green"/>
  <text x="154" y="650" class="label">END</text>
  <text x="118" y="672" class="tiny">返回 last_state 给 CLI</text>

  <rect x="344" y="746" width="204" height="76" class="node violet"/>
  <text x="390" y="778" class="label">result_backfill</text>
  <text x="374" y="800" class="tiny">tool results -> messages</text>

  <rect x="612" y="746" width="204" height="76" class="node rose"/>
  <text x="660" y="778" class="label">tool_execution</text>
  <text x="654" y="800" class="tiny">调用 tool_runner</text>

  <path class="arrow" d="M612 656 H548"/>
  <path class="arrow" d="M344 656 H280"/>
  <path class="arrow" d="M816 656 C862 656 862 784 816 784"/>
  <path class="arrow" d="M612 784 H548"/>
  <path class="arrow" d="M344 784 H306 V556 H446 V534"/>
  <text x="292" y="574" class="tiny">下一轮回到 preprocess</text>

  <rect x="1026" y="374" width="530" height="476" class="panel"/>
  <text x="1054" y="412" class="section">3. 工具管线：审查和执行被隔离在子 Agent 侧</text>
  <rect x="1086" y="456" width="190" height="78" class="node violet"/>
  <text x="1128" y="488" class="label">tool_runner</text>
  <text x="1118" y="510" class="tiny">构造短上下文 sub_context</text>
  <rect x="1324" y="456" width="174" height="78" class="node blue"/>
  <text x="1364" y="488" class="label">validateInput</text>
  <text x="1352" y="510" class="tiny">schema / required fields</text>
  <rect x="1324" y="590" width="174" height="78" class="node amber"/>
  <text x="1356" y="622" class="label">permission</text>
  <text x="1354" y="644" class="tiny">allow / ask / deny</text>
  <rect x="1086" y="590" width="190" height="78" class="node green"/>
  <text x="1132" y="622" class="label">tool batches</text>
  <text x="1118" y="644" class="tiny">只读工具可并发</text>
  <rect x="1086" y="724" width="412" height="78" class="node rose"/>
  <text x="1230" y="756" class="label">Tools Registry</text>
  <text x="1132" y="778" class="tiny">project / file / command / memory / context / time / calculator</text>
  <path class="arrow" d="M1276 495 H1324"/>
  <path class="arrow" d="M1411 534 V590"/>
  <path class="arrow" d="M1324 629 H1276"/>
  <path class="arrow" d="M1181 668 V724"/>

  <rect x="44" y="888" width="1512" height="176" class="panel"/>
  <text x="72" y="926" class="section">4. 支撑层：这些模块不抢主循环，但决定 Agent 能不能长时间工作</text>
  <rect x="82" y="958" width="220" height="62" class="node rose"/>
  <text x="116" y="984" class="label">Memory system</text>
  <text x="116" y="1006" class="tiny">MEMORY.md / TTL / score</text>
  <rect x="350" y="958" width="220" height="62" class="node gray"/>
  <text x="386" y="984" class="label">Session store</text>
  <text x="386" y="1006" class="tiny">SQLite messages + title summary</text>
  <rect x="618" y="958" width="220" height="62" class="node blue"/>
  <text x="654" y="984" class="label">Context manager</text>
  <text x="654" y="1006" class="tiny">snip / micro / collapse / auto compact</text>
  <rect x="886" y="958" width="220" height="62" class="node green"/>
  <text x="930" y="984" class="label">Model client</text>
  <text x="930" y="1006" class="tiny">DashScope OpenAI-compatible stream</text>
  <rect x="1154" y="958" width="314" height="62" class="node amber"/>
  <text x="1196" y="984" class="label">Terminal observability</text>
  <text x="1196" y="1006" class="tiny">state / tool_call / review / token / context events</text>

  <text x="54" y="1094" class="mono">核心文件：cli.py, graph.py, context_manager.py, model_client.py, session_store.py · tool_runner.py, tool_search.py, memory_retrieval.py · registry.py · store.py</text>
</svg>
